name: Multi-OS CI with Matrix

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        # Định nghĩa các hệ điều hành cần chạy
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }} # Biến này sẽ thay đổi theo từng job

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn -B package
      