name: Java CI with Maven Matrix

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        # Chạy trên 3 hệ điều hành cùng lúc
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package "-Dcheckstyle.skip"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bank-system-${{ matrix.os }}
          path: target/*.jar